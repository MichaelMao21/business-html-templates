<!--
Usage:
Copy this chart card into a .charts grid. Replace row labels, values, and --v widths.
Keep --v proportional to the largest comparable value in the chart.
Requires the template.html CSS classes: .panel, .chart-card, .card-head, .bar-chart, .bar-row, .bar-track, .bar-fill.
-->
<article class="panel chart-card">
  <div class="card-head">
    <h2>渠道 GMV 贡献</h2>
    <span>单位：万元</span>
  </div>
  <div class="bar-chart">
    <div class="bar-row">
      <span class="name">搜索广告</span>
      <div class="bar-track"><div class="bar-fill" style="--v: 86%"></div></div>
      <span class="num">2,680</span>
    </div>
    <div class="bar-row">
      <span class="name">内容种草</span>
      <div class="bar-track"><div class="bar-fill" style="--v: 74%"></div></div>
      <span class="num">2,310</span>
    </div>
    <div class="bar-row">
      <span class="name">达人直播</span>
      <div class="bar-track"><div class="bar-fill" style="--v: 61%"></div></div>
      <span class="num">1,920</span>
    </div>
  </div>
</article>
